<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Jireh" />
    <title>Jireh Operaciones</title>
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('jireh.theme');
          var theme = savedTheme === 'dark' || savedTheme === 'dark-deep' || savedTheme === 'dark-sidebar' ? savedTheme : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <div id="root"></div>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById('root');
        if (!root || root.childElementCount > 0) return;

        var reloadKey = 'jireh.pages.reload';
        if (!sessionStorage.getItem(reloadKey)) {
          sessionStorage.setItem(reloadKey, '1');
          var url = new URL(window.location.href);
          url.searchParams.set('reload', Date.now().toString());
          window.location.replace(url.toString());
          return;
        }

        root.innerHTML =
          '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:system-ui,sans-serif;background:#f7f8fa;color:#18202a">' +
          '<section style="max-width:420px;text-align:center">' +
          '<h1 style="font-size:1.35rem">No se pudo cargar Jireh</h1>' +
          '<p>Actualiza la pagina. Si el problema continua, espera un minuto mientras termina el despliegue.</p>' +
          '<button onclick="sessionStorage.removeItem(&quot;jireh.pages.reload&quot;);location.reload()" style="border:0;border-radius:10px;padding:12px 18px;background:#166534;color:white;font-weight:700">Volver a cargar</button>' +
          '</section></main>';
      }, 4000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

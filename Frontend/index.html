<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jireh Operaciones</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('jireh.theme');
          var theme = savedTheme === 'dark' || savedTheme === 'dark-deep' || savedTheme === 'dark-sidebar' ? savedTheme : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

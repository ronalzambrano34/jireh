services:
  backend:
    build: ./Backend
    container_name: jireh-backend
    environment:
      MALLOC_ARENA_MAX: "2"
      PYTHONMALLOC: "malloc"
      RUN_DB_MAINTENANCE: "false"
    mem_limit: 384m
    mem_reservation: 128m
    pids_limit: 100
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app/Backend
      - ./Backend/credentials.json:/app/Backend/credentials.json:ro
    restart: always
    env_file:
      - Backend/.env

  frontend:
    build: ./Frontend
    container_name: jireh-frontend
    mem_limit: 64m
    mem_reservation: 16m
    pids_limit: 100
    ports:
      - "5173:5173"
    restart: always
